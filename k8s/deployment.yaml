apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  labels:
    app: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
      - name: my-app
        image: ghcr.io/veerendra1233/my-app:214e9ffd11a66931ed916d9d0972b795af8675d5
        ports:
        - containerPort: 80
